services:
  typetosurvive:
    build: .
    container_name: typetosurvive
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - typetosurvive-data:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.typetosurvive.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.typetosurvive.entrypoints=websecure"
      - "traefik.http.routers.typetosurvive.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.typetosurvive.tls.domains[0].main=${TRAEFIK_BASEDOMAIN}"
      - "traefik.http.routers.typetosurvive.tls.domains[0].sans=*.${TRAEFIK_BASEDOMAIN}"
      - "traefik.http.services.typetosurvive.loadbalancer.server.port=3001"
    networks:
      - traefik-public

volumes:
  typetosurvive-data:

networks:
  traefik-public:
    external: true
